name: Build and Push Hybrid Web Nginx Image

on:
  push:
    branches:
      - production
    paths:
      - "hybrid-web/**"
      - ".github/workflows/hybrid-web-container.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/norkator/porssiohjain-hybrid-web:latest
  VITE_API_BASE_URL: https://app.porssiohjain.fi/

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./hybrid-web
          file: ./hybrid-web/Dockerfile
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}
