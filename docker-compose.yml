version: "3.9"
services:
  postgres:
    image: postgres:17
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: porssiohjain
      POSTGRES_PASSWORD: porssiohjain
      POSTGRES_DB: porssiohjain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: rabbitmq
    ports:
      - "1883:1883"
      - "8883:8883"
      - "15673:15672"
    volumes:
      - ./compose/rabbitmq.config:/etc/rabbitmq/rabbitmq.config:ro
      - ./compose/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - /opt/rabbitmq-certs:/etc/rabbitmq/certs:ro
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    restart: "no"

volumes:
  postgres_data:
